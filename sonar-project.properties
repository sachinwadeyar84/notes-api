# sonar-project.properties
# SonarCloud uses this file to understand your project
# SonarCloud = code quality tool that checks:
#   - bugs in your code
#   - security vulnerabilities
#   - code smells (bad practices)
#   - test coverage (how much of your code is tested)

sonar.projectKey=sachinwadeyar84_notes-api
sonar.organization=sachinwadeyar84
sonar.projectName=Notes API
sonar.projectVersion=1.0

# Where is the source code
sonar.sources=.

# Ignore these folders (no need to scan them)
sonar.exclusions=venv/**,__pycache__/**,*.pyc

# Python language
sonar.language=python

# Test results file location (generated by pytest)
sonar.python.coverage.reportPaths=coverage.xml
